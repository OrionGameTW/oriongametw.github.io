<!doctype html>
<html lang="zh-TW"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --navy: #1e3a5f;
      --navy-deep: #152b49;
      --slate: #475569;
      --line: #cbd5e8;
      --work: #dbeafe;
      --tcg: #fef3c7;
      --break: #d1fae5;
      --check: #f3e8ff;
    }

    * { box-sizing: border-box; }

    body {
      width: 100%;
      margin: 0;
      font-family: "DM Sans", sans-serif;
      background: #f1f5f9;
    }

    .schedule-shell {
      box-shadow: 0 18px 42px rgba(30, 58, 95, 0.10);
    }

    .tab-btn {
      border: 1px solid transparent;
      min-height: 42px;
    }

    .tab-active {
      background: var(--navy);
      color: #ffffff;
      box-shadow: 0 8px 16px rgba(30, 58, 95, 0.22);
    }

    .tab-inactive {
      background: #e2e8f0;
      color: #334155;
    }

    .tab-btn:hover {
      transform: translateY(-1px);
    }

    .tab-btn:focus-visible,
    .action-btn:focus-visible {
      outline: 3px solid #7dd3fc;
      outline-offset: 3px;
    }

    .table-frame {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #ffffff;
    }

    table {
      width: 100%;
      min-width: 780px;
      border-collapse: collapse;
    }

    th,
    td {
      border: 1px solid var(--line);
      padding: 8px 10px;
      text-align: center;
      vertical-align: middle;
      font-size: 13px;
      line-height: 1.35;
      min-width: 108px;
      width: 108px;
    }

    th {
      width: 108px;
      background: var(--navy);
      color: #ffffff;
      font-weight: 700;
      white-space: nowrap;
    }

    .time-cell {
      min-width: 86px;
      background: #f8fafc;
      color: #334155;
      font-weight: 700;
      white-space: nowrap;
    }

    .cell-work {
      background: var(--work);
      color: #1e3a8a;
      font-weight: 600;
    }

    .cell-tcg {
      background: var(--tcg);
      color: #92400e;
      font-weight: 600;
    }

    .cell-break {
      background: var(--break);
      color: #065f46;
      font-weight: 700;
    }

    .cell-check {
      background: var(--check);
      color: #7e22ce;
      font-weight: 700;
    }

    .resp-card {
      min-height: 150px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      box-shadow: 0 8px 16px rgba(30, 58, 95, 0.06);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .resp-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 24px rgba(30, 58, 95, 0.10);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    @media (max-width: 640px) {
      th,
      td {
        padding: 7px 8px;
        font-size: 12px;
      }
    }
  </style>
 </head>

    <button type="button" class="tab-btn tab-inactive px-5 py-2 rounded-full font-semibold transition" data-day="4" role="tab" aria-selected="false">7/27(一)</button>
   </nav>
  </header>
  <main class="w-full max-w-6xl mx-auto">
   <section class="schedule-shell rounded-2xl p-4 md:p-6 mb-6" aria-labelledby="schedule-heading">
    <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between mb-5">
     <div>
      <h2 id="schedule-heading" class="font-bold" style="font-size: 18px; color: var(--navy);">每日班表</h2>
      <p id="active-date" class="mt-1 text-sm text-slate-500" aria-live="polite"></p>
     </div>
     <aside aria-label="班表顏色說明" class="flex flex-wrap gap-x-4 gap-y-2 text-xs font-medium text-slate-600">
      <span class="inline-flex items-center gap-1.5"><span class="legend-dot" style="background:#93c5fd"></span>桌遊教學</span>
      <span class="inline-flex items-center gap-1.5"><span class="legend-dot" style="background:#fde68a"></span>TCG 教學</span>
      <span class="inline-flex items-center gap-1.5"><span class="legend-dot" style="background:#86efac"></span>午休</span>
     </aside>
    </div>
    <div class="table-frame">
     <div id="schedule-table" aria-live="polite"></div>
    </div>
   </section>
   <section class="schedule-shell rounded-2xl p-4 md:p-6" aria-labelledby="resp-heading">
    <div class="flex items-center justify-between gap-4 mb-5">
     <div>

     </div>
     <i data-lucide="users" class="w-7 h-7 text-slate-400" aria-hidden="true"></i>
    </div>
    <div id="resp-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" aria-live="polite"></div>
   </section>
  </main>

        ]
      },
      {
        date: "2026/7/24（五）",
        staff: [
          { name: "劉至賢", role: "桌遊教學", duty: "桌遊", lunch: ["12:30", "13:30"], area: "桌遊－攤位內", games: "寶可夢 PLAKORO" },
          { name: "柯奕丞", role: "桌遊教學", duty: "桌遊", lunch: ["13:00", "14:00"], area: "桌遊－攤位內", games: "萬物皆掌、瞎猜21點、寶可夢 PLAKORO" },
          { name: "劉秉豐", role: "桌遊教學", duty: "桌遊", lunch: ["13:30", "14:30"], area: "桌遊－攤位內", games: "誰是默契王、比逗、寶可夢 PLAKORO" },
          { name: "黃柏鈞", role: "展場活動／機動人員", duty: "TCG", lunch: ["13:30", "14:30"], area: "TCG－攤位內", games: "機動人員" },
          { name: "周星罕", role: "TCG 教學", duty: "TCG", lunch: ["13:30", "14:30"], area: "TCG－攤位內", games: "航海王卡牌遊戲" },
          { name: "林建廷", role: "TCG 教學", duty: "TCG", lunch: ["13:00", "14:00"], area: "TCG－攤位內", games: "UA 卡牌遊戲" },
          { name: "陳昶寧", role: "TCG 教學", duty: "TCG", lunch: ["13:30", "14:30"], area: "TCG－攤位內", games: "鋼彈卡牌遊戲" }
        ]
      },
      {
        date: "2026/7/25（六）",
        staff: [
          { name: "莊竹立", role: "展場活動／機動人員", duty: "桌遊", lunch: ["12:30", "13:30"], area: "桌遊－攤位內", games: "機動人員" },
          { name: "黃泓儒", role: "桌遊教學", duty: "桌遊", lunch: ["12:30", "13:30"], area: "桌遊－攤位內", games: "寶可夢 PLAKORO" },
          { name: "柯奕丞", role: "桌遊教學", duty: "桌遊", lunch: ["13:00", "14:00"], area: "桌遊－攤位內", games: "萬物皆掌、瞎猜21點、寶可夢 PLAKORO" },
          { name: "劉秉豐", role: "桌遊教學", duty: "桌遊", lunch: ["13:30", "14:30"], area: "桌遊－攤位內", games: "誰是默契王、比逗、寶可夢 PLAKORO" },
          { name: "黃柏鈞", role: "展場活動／機動人員", duty: "TCG", lunch: ["13:00", "14:00"], area: "TCG－攤位內", games: "機動人員" },
          { name: "周星罕", role: "TCG 教學", duty: "TCG", lunch: ["13:00", "14:00"], area: "TCG－攤位內", games: "航海王卡牌遊戲" },
          { name: "林建廷", role: "TCG 教學", duty: "TCG", lunch: ["13:00", "14:00"], area: "TCG－攤位內", games: "UA 卡牌遊戲" },
          { name: "陳昶寧", role: "TCG 教學", duty: "TCG", lunch: ["13:30", "14:30"], area: "TCG－攤位內", games: "鋼彈卡牌遊戲" }
        ]
      },
      {
        date: "2026/7/26（日）",
        staff: [
          { name: "莊竹立", role: "展場活動／機動人員", duty: "桌遊", lunch: ["12:30", "13:30"], area: "桌遊－攤位內", games: "機動人員" },
          { name: "黃泓儒", role: "桌遊教學", duty: "桌遊", lunch: ["13:00", "14:00"], area: "桌遊－攤位內", games: "寶可夢 PLAKORO" },
          { name: "柯奕丞", role: "桌遊教學", duty: "桌遊", lunch: ["13:30", "14:30"], area: "桌遊－攤位內", games: "萬物皆掌、瞎猜21點、寶可夢 PLAKORO" },
          { name: "劉秉豐", role: "桌遊教學", duty: "桌遊", lunch: ["13:00", "14:00"], area: "桌遊－攤位內", games: "誰是默契王、比逗、寶可夢 PLAKORO" },
          { name: "黃柏鈞", role: "展場活動／機動人員", duty: "TCG", lunch: ["13:00", "14:00"], area: "TCG－攤位內", games: "機動人員" },

          { name: "陳昶寧", role: "TCG 教學", duty: "TCG", lunch: ["13:30", "14:30"], area: "TCG－攤位內", games: "鋼彈卡牌遊戲" }
        ]
      },
      {
        date: "2026/7/27（一）",
        staff: [
          { name: "劉至賢", role: "桌遊教學", duty: "桌遊", lunch: ["12:30", "13:30"], area: "桌遊－攤位內", games: "寶可夢 PLAKORO" },
          { name: "柯奕丞", role: "桌遊教學", duty: "桌遊", lunch: ["13:00", "14:00"], area: "桌遊－攤位內", games: "萬物皆掌、瞎猜21點、寶可夢 PLAKORO" },
          { name: "劉秉豐", role: "桌遊教學", duty: "桌遊", lunch: ["13:30", "14:30"], area: "桌遊－攤位內", games: "誰是默契王、比逗、寶可夢 PLAKORO" },
          { name: "黃柏鈞", role: "展場活動／機動人員", duty: "TCG", lunch: ["13:00", "14:00"], area: "TCG－攤位內", games: "機動人員" },
          { name: "周星罕", role: "TCG 教學", duty: "TCG", lunch: ["13:00", "14:00"], area: "TCG－攤位內", games: "航海王卡牌遊戲" },
          { name: "林建廷", role: "TCG 教學", duty: "TCG", lunch: ["13:00", "14:00"], area: "TCG－攤位內", games: "UA 卡牌遊戲" },
          { name: "陳昶寧", role: "TCG 教學", duty: "TCG", lunch: ["13:30", "14:30"], area: "TCG－攤位內", games: "鋼彈卡牌遊戲" }
        ]
      }
    ];

    let currentDay = 0;

    function isBreak(staff, time) {
      return time >= staff.lunch[0] && time < staff.lunch[1];
    }

    function cellClass(duty) {
      if (duty === "TCG") return "cell-tcg";
      return "cell-work";
    }

    function renderSchedule() {
      const day = days[currentDay];
      const activeDate = document.getElementById("active-date");
      const scheduleTable = document.getElementById("schedule-table");

      activeDate.textContent = day.date;

      let html = "<table><thead><tr><th>時間</th>";
      day.staff.forEach((staff) => {
        html += "<th>" + staff.name + "</th>";
      });
      html += "</tr></thead><tbody>";

      html += '<tr><td class="time-cell">開場前</td>';
      day.staff.forEach(() => {
        html += '<td class="cell-check">開場前確認</td>';
      });
      html += "</tr>";

      const rowspans = new Array(day.staff.length).fill(0);

      TIMES.forEach((time, timeIndex) => {
        html += "<tr><td class=\"time-cell\">" + time + "</td>";

        day.staff.forEach((staff, staffIndex) => {
          if (rowspans[staffIndex] > 0) {
            rowspans[staffIndex]--;
            return;
          }

          const breakNow = isBreak(staff, time);
          let span = 1;

          for (let nextIndex = timeIndex + 1; nextIndex < TIMES.length; nextIndex++) {
            const nextSameState = breakNow
              ? isBreak(staff, TIMES[nextIndex])
              : !isBreak(staff, TIMES[nextIndex]);

            if (!nextSameState) break;
            span++;
          }

          if (span > 1) {
            rowspans[staffIndex] = span - 1;
          }

          if (breakNow) {
            html += '<td class="cell-break" rowspan="' + span + '">午休</td>';
          } else {
            html += '<td class="' + cellClass(staff.duty) + '" rowspan="' + span + '">' + staff.role + "</td>";
          }
        });

        html += "</tr>";
      });

      html += "</tbody></table>";
      scheduleTable.innerHTML = html;
    }

    function renderResponsibilities() {
      const cardList = document.getElementById("resp-cards");
      const day = days[currentDay];

      cardList.innerHTML = day.staff.map((staff) => {
        const isTcg = staff.duty === "TCG";
        const background = isTcg ? "#fef3c7" : "#dbeafe";
        const accent = isTcg ? "#92400e" : "#1e3a8a";

        return `
          <article class="resp-card rounded-xl p-4" style="background:${background}">
            <div class="flex items-start justify-between gap-3">
              <h3 class="font-bold text-slate-800 text-base">${staff.name}</h3>
              <span class="inline-flex shrink-0 rounded-full px-2.5 py-1 text-xs font-bold" style="background:rgba(255,255,255,.72);color:${accent}">${staff.role}</span>
            </div>
            <div class="mt-4 space-y-2 text-sm">
              <p class="flex gap-2 text-slate-600">
                <i data-lucide="map-pin" class="w-4 h-4 shrink-0 mt-0.5" aria-hidden="true"></i>
                <span>${staff.area}</span>
              </p>
              <p class="flex gap-2" style="color:${accent}">
                <i data-lucide="gamepad-2" class="w-4 h-4 shrink-0 mt-0.5" aria-hidden="true"></i>
                <span>${staff.games}</span>
              </p>
              <p class="flex gap-2 text-slate-500">
                <i data-lucide="clock-3" class="w-4 h-4 shrink-0 mt-0.5" aria-hidden="true"></i>
                <span>午休 ${staff.lunch[0]}–${staff.lunch[1]}</span>
              </p>
            </div>
          </article>
        `;
      }).join("");

      lucide.createIcons();
    }

    function render() {
      renderSchedule();
      renderResponsibilities();
    }

    document.querySelectorAll(".tab-btn").forEach((button) => {
      button.addEventListener("click", () => {
        currentDay = Number(button.dataset.day);

        document.querySelectorAll(".tab-btn").forEach((tab) => {
          const isActive = tab === button;
          tab.classList.toggle("tab-active", isActive);
          tab.classList.toggle("tab-inactive", !isActive);
          tab.setAttribute("aria-selected", String(isActive));
        });

        render();
      });
    });

    lucide.createIcons();
    render();
  </script>
 </body></html>
